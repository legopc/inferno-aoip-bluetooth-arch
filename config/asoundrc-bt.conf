# ~/.asoundrc additions for Inferno AoIP Bluetooth A2DP → Dante
#
# APPEND to existing ~/.asoundrc (do not replace it).
#
# Replace ALL placeholders before deploying:
#   YOUR_NIC          → wired NIC name for Dante (ip link show, e.g. enp1s0, eth0)
#   YOUR_BT_DEVICE_ID → MAC + 0001. Example: aabbccddeeff0001
#   YOUR_BT_DEVICE_NAME → name in Dante Controller (e.g. "Office-Bluetooth")
#
# DEVICE_ID derivation:
#   NIC=eth0
#   MAC=$(cat /sys/class/net/$NIC/address | tr -d ':')
#   echo "${MAC}0001"
#
# PROCESS_ID / ALT_PORT: must not conflict with other Inferno instances on this node.
#   inferno_spotify (if coexisting): PROCESS_ID 1, ALT_PORT 6000
#   inferno_bluetooth:               PROCESS_ID 4, ALT_PORT 6004
#
# Loopback subdevice: uses subdevice 2 to avoid conflict with Spotify (subdevice 0).
# Default snd-aloop provides 8 subdevices — no extra modprobe options needed.

# ── dmix mix bus — write side of loopback subdevice 2 ───────────────────────
# Allows concurrent writers (silence keepalive + BT audio stream)
pcm.bt_mix {
    type dmix
    ipc_key 5002
    slave {
        pcm "hw:Loopback,0,2"
        rate 48000
        format S32_LE
        channels 2
        period_size 256
        periods 4
    }
}

# ── Format converter — bridge writes here ───────────────────────────────────
# bluealsa produces S16_LE at 44.1 kHz (SBC) or 48 kHz (AAC).
# bt_mix dmix requires S32_LE at 48 kHz.
# plug handles both rate conversion and format widening automatically.
pcm.bt_sink {
    type plug
    slave {
        pcm "bt_mix"
        rate 48000
        format S32_LE
        channels 2
    }
}

# ── Inferno Bluetooth TX plugin ─────────────────────────────────────────────
# Opened by inferno-bt-loop (alsaloop) — not opened directly by bridge service.
pcm.inferno_bluetooth {
    type inferno
    NAME "YOUR_BT_DEVICE_NAME"
    BIND_IP YOUR_NIC
    SAMPLE_RATE 48000
    PROCESS_ID 4
    ALT_PORT 6004
    RX_CHANNELS 0
    TX_CHANNELS 2
    TX_LATENCY_NS 10000000
    RX_LATENCY_NS 10000000
    CLOCK_PATH /tmp/ptp-usrvclock
    DEVICE_ID YOUR_BT_DEVICE_ID

    hint {
        show off
        description "Inferno ALSA virtual device for Bluetooth A2DP"
    }
}
