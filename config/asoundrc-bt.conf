# Bluetooth A2DP → Inferno → Dante ALSA config block
# Include in ~/.asoundrc on the Bluetooth node
#
# Prerequisites:
#   - bluez-alsa-git (AUR) installed and bluealsa.service running (system)
#   - snd-aloop loaded with pcm_substreams=4+ (modprobe snd-aloop pcm_substreams=4)
#   - Inferno ALSA plugin installed (/usr/lib/alsa-lib/libasound_module_pcm_inferno.so)
#   - PipeWire/wireplumber MUST be masked (they intercept A2DP before bluealsa)
#       sudo systemctl --user mask pipewire pipewire-pulse wireplumber
#
# DEVICE_ID: strip colons from MAC, pad to 16 hex digits with trailing 00s
#   NIC=enp0s31f6; echo $(cat /sys/class/net/$NIC/address | tr -d ':')0001
#   (increment last byte from Spotify instance: ...0000 → ...0001)
#
# Key lessons:
#   - bluealsa ALSA device is "bluealsa" (plugin), NOT "hw:bluealsa,N"
#   - A2DP profile does NOT auto-connect on BT reconnect on some phones —
#     the bridge service polls bluealsa-aplay until A2DP appears
#   - "bluetoothctl connect <MAC>" blocks ~41s with LE failure before BR/EDR;
#     do NOT use it in the bridge ExecStart — poll instead
#   - AAC codec (Android/iPhone) negotiates 44100 Hz S16_LE via bluealsa
#   - bt_mix (dmix) needs S32_LE/48kHz; use bt_sink plug for conversion

# ============================================================
# Step 1: snd-aloop write side (keepalive holds it open with silence)
# ============================================================
# Uses subdevice 2 — subdevice 0 reserved for Spotify instance
pcm.bt_mix {
    type dmix
    ipc_key 5002
    slave {
        pcm "hw:Loopback,0,2"
        rate 48000
        format S32_LE
        channels 2
        period_size 256
        periods 4
    }
}

# ============================================================
# Step 2: Format converter — bridge writes here
# bluealsa gives S16_LE/44100; bt_mix dmix needs S32_LE/48000
# plug handles both rate conversion and sample format widening
# ============================================================
pcm.bt_sink {
    type plug
    slave {
        pcm "bt_mix"
        rate 48000
        format S32_LE
        channels 2
    }
}

# ============================================================
# Step 3: Inferno TX plugin — reads loopback capture, sends to Dante
# Replace DEVICE_ID, ALT_PORT, BIND_IP before deploying
# ============================================================
pcm.inferno_bluetooth {
    type inferno
    NAME "T470s-Bluetooth"
    BIND_IP enp0s31f6
    SAMPLE_RATE 48000
    PROCESS_ID 4
    ALT_PORT 6004
    RX_CHANNELS 0
    TX_CHANNELS 2
    TX_LATENCY_NS 10000000
    RX_LATENCY_NS 10000000
    CLOCK_PATH /tmp/ptp-usrvclock
    DEVICE_ID 54e1ad6a8b330001

    hint {
        show off
        description "Inferno ALSA virtual device for Bluetooth A2DP"
    }
}
