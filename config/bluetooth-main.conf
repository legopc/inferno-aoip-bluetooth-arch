[General]
# Power on Bluetooth automatically at boot
AutoEnable=true
# Accept pairing without PIN entry (headless-safe)
JustWorksRepairing=always
# Remember Bluetooth power state across reboots
RememberPoweredState=true
# Classic BT + LE (required for A2DP)
ControllerMode=dual
# Stay discoverable and pairable permanently
DiscoverableTimeout=0
PairableTimeout=0
# Name shown on phones during pairing
Name=T470s-Dante

[Policy]
# Automatically reconnect to previously paired devices on boot
AutoConnect=true
