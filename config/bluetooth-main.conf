[General]
# Power on Bluetooth automatically at boot
AutoEnable=true

# Accept pairing without PIN (headless-safe — works with bt-agent auto-accept)
JustWorksRepairing=always

# Remember Bluetooth power state across reboots
RememberPoweredState=true

# Classic BT + LE (A2DP is classic BT — not LE — both modes are required)
ControllerMode=dual

# Stay discoverable permanently (timeout=0 means no expiry)
DiscoverableTimeout=0

# Stay pairable permanently
PairableTimeout=0

# Name advertised to phones during Bluetooth scanning (change to your preference)
Name=BT-Dante

[Policy]
# Reconnect to previously paired devices automatically on boot
AutoConnect=true
